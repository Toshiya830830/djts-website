<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="45%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4A017" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#D4A017" stop-opacity="0.6"/>
      <stop offset="65%"  stop-color="#D4A017" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="8" x2="320" y2="8" stroke="url(#goldLine)" stroke-width="0.5"/>

  <text
    x="160" y="48"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="800"
    letter-spacing="12"
    fill="url(#gold)"
  >DJTS</text>

  <line x1="0" y1="57" x2="320" y2="57" stroke="url(#goldLine)" stroke-width="0.5"/>
</svg>
