<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF0A0"/>
      <stop offset="30%"  stop-color="#FFD700"/>
      <stop offset="60%"  stop-color="#C8920A"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>

    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>

    <!-- ぼやけを最小限にした微細なグロウ -->
    <filter id="glow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 上部装飾ライン -->
  <line x1="0" y1="8" x2="320" y2="8"
        stroke="url(#goldLine)" stroke-width="0.6"/>

  <!-- メインロゴテキスト -->
  <text
    x="160" y="47"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="46"
    font-weight="800"
    letter-spacing="12"
    fill="url(#gold)"
    filter="url(#glow)"
  >DJTS</text>

  <!-- 下部装飾ライン -->
  <line x1="0" y1="56" x2="320" y2="56"
        stroke="url(#goldLine)" stroke-width="0.6"/>
</svg>
