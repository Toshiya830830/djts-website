<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <!-- ゴールドグラデーション -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="35%"  stop-color="#D4A843"/>
      <stop offset="65%"  stop-color="#C8962E"/>
      <stop offset="100%" stop-color="#E8C060"/>
    </linearGradient>

    <!-- アクセントライン用グラデーション -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8962E" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#D4A843"/>
      <stop offset="70%"  stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#C8962E" stop-opacity="0"/>
    </linearGradient>

    <!-- テキストシャドウ用フィルター -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 上部装飾ライン -->
  <line x1="20" y1="18" x2="300" y2="18"
        stroke="url(#goldLine)" stroke-width="0.6" opacity="0.6"/>

  <!-- メインロゴテキスト -->
  <text
    x="160" y="55"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="14"
    fill="url(#gold)"
    filter="url(#glow)"
  >DJTS</text>

  <!-- サブテキスト -->
  <text
    x="160" y="70"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="8"
    font-weight="300"
    letter-spacing="6"
    fill="#D4A843"
    opacity="0.75"
  >WEB MARKETING</text>

  <!-- 下部装飾ライン -->
  <line x1="20" y1="76" x2="300" y2="76"
        stroke="url(#goldLine)" stroke-width="0.6" opacity="0.6"/>
</svg>
