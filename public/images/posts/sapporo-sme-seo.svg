<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#0d0c06"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="62.5" x2="1200" y2="62.5"/>
    <line x1="0" y1="125" x2="1200" y2="125"/>
    <line x1="0" y1="187.5" x2="1200" y2="187.5"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="312.5" x2="1200" y2="312.5"/>
    <line x1="0" y1="375" x2="1200" y2="375"/>
    <line x1="0" y1="437.5" x2="1200" y2="437.5"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
  </g>

  <!-- Glow -->
  <ellipse cx="860" cy="260" rx="320" ry="260" fill="#C9A84C" opacity="0.08"/>

  <!-- Accent line -->
  <rect x="80" y="0" width="1" height="500" fill="#C9A84C" opacity="0.25"/>

  <!-- Location pin + search icon -->
  <g transform="translate(840, 220)">
    <!-- Pin body -->
    <path d="M0,-100 C-55,-100 -90,-65 -90,-20 C-90,40 0,110 0,110 C0,110 90,40 90,-20 C90,-65 55,-100 0,-100 Z"
          fill="none" stroke="#C9A84C" stroke-width="6" opacity="0.85"/>
    <!-- Pin inner circle -->
    <circle cx="0" cy="-20" r="32" fill="#C9A84C" opacity="0.2"/>
    <circle cx="0" cy="-20" r="32" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.7"/>
    <!-- Magnifier overlapping -->
    <circle cx="52" cy="-75" r="30" fill="none" stroke="#C9A84C" stroke-width="5" opacity="0.75"/>
    <line x1="74" y1="-53" x2="96" y2="-31" stroke="#C9A84C" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <!-- Rank bars inside pin -->
    <rect x="-18" y="-8" width="10" height="16" fill="#C9A84C" opacity="0.6"/>
    <rect x="-4"  y="-18" width="10" height="26" fill="#C9A84C" opacity="0.85"/>
    <rect x="10"  y="-12" width="10" height="20" fill="#C9A84C" opacity="0.6"/>
  </g>

  <!-- Label -->
  <text x="140" y="178" font-family="'DM Mono', monospace, sans-serif" font-size="13" letter-spacing="4" fill="#C9A84C" opacity="0.9">LOCAL SEO · SAPPORO</text>
  <rect x="140" y="192" width="32" height="1" fill="#C9A84C"/>

  <!-- Main title -->
  <text x="140" y="268" font-family="sans-serif" font-size="52" font-weight="700" fill="#F5F3EE" letter-spacing="-1">札幌の中小企業が</text>
  <text x="140" y="334" font-family="sans-serif" font-size="52" font-weight="700" fill="#F5F3EE" letter-spacing="-1">今すぐ始めるSEO対策</text>

  <!-- Tags -->
  <rect x="140" y="362" width="90" height="26" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <text x="153" y="380" font-family="sans-serif" font-size="11" letter-spacing="2" fill="#C9A84C" opacity="0.8">2026年最新版</text>

  <rect x="244" y="362" width="72" height="26" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <text x="257" y="380" font-family="sans-serif" font-size="11" letter-spacing="2" fill="#C9A84C" opacity="0.6">中小企業</text>

  <!-- DJTS watermark -->
  <text x="1060" y="476" font-family="serif" font-size="13" letter-spacing="3" fill="#C9A84C" opacity="0.4">DJTS</text>
</svg>
