<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="62.5" x2="1200" y2="62.5"/>
    <line x1="0" y1="125" x2="1200" y2="125"/>
    <line x1="0" y1="187.5" x2="1200" y2="187.5"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="312.5" x2="1200" y2="312.5"/>
    <line x1="0" y1="375" x2="1200" y2="375"/>
    <line x1="0" y1="437.5" x2="1200" y2="437.5"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
  </g>

  <circle cx="840" cy="250" r="300" fill="url(#glow)"/>
  <rect x="80" y="0" width="1" height="500" fill="#C9A84C" opacity="0.25"/>

  <!-- Network / SNS icon -->
  <g transform="translate(830, 240)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="20" fill="#C9A84C" opacity="0.95"/>
    <!-- Outer nodes -->
    <circle cx="-110" cy="-70" r="14" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.8"/>
    <circle cx="110" cy="-70" r="14" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.8"/>
    <circle cx="-110" cy="70" r="14" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.6"/>
    <circle cx="110" cy="70" r="14" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="-120" r="10" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.5"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-96" y2="-62" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="96" y2="-62" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="-96" y2="62" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="0" x2="96" y2="62" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"/>
    <!-- Cross connections -->
    <line x1="-96" y1="-62" x2="96" y2="-62" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
    <line x1="-96" y1="-62" x2="-96" y2="62" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
    <line x1="96" y1="-62" x2="96" y2="62" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
    <!-- Platform labels -->
    <text x="-125" y="-56" font-family="monospace" font-size="9" letter-spacing="1" fill="#C9A84C" opacity="0.7">IG</text>
    <text x="100" y="-56" font-family="monospace" font-size="9" letter-spacing="1" fill="#C9A84C" opacity="0.7">TT</text>
    <text x="-118" y="84" font-family="monospace" font-size="9" letter-spacing="1" fill="#C9A84C" opacity="0.6">FB</text>
    <text x="100" y="84" font-family="monospace" font-size="9" letter-spacing="1" fill="#C9A84C" opacity="0.6">X</text>
  </g>

  <text x="140" y="178" font-family="'DM Mono', monospace, sans-serif" font-size="13" letter-spacing="4" fill="#C9A84C" opacity="0.9">SNS MARKETING</text>
  <rect x="140" y="192" width="32" height="1" fill="#C9A84C"/>

  <text x="140" y="268" font-family="sans-serif" font-size="56" font-weight="700" fill="#F5F3EE" letter-spacing="-1">SNSマーケティング</text>
  <text x="140" y="338" font-family="sans-serif" font-size="56" font-weight="700" fill="#F5F3EE" letter-spacing="-1">戦略の立て方</text>

  <rect x="140" y="384" width="126" height="28" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <text x="153" y="403" font-family="sans-serif" font-size="11" letter-spacing="2" fill="#C9A84C" opacity="0.8">2026年最新版</text>

  <text x="1060" y="476" font-family="serif" font-size="13" letter-spacing="3" fill="#C9A84C" opacity="0.4">DJTS</text>
</svg>
